events { worker_connections 1024; }

http {
    resolver 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Deno прокси (запасной)
    upstream deno_backend {
        server silent-tuna-64.attrib.deno.net:443;
    }

    # CF Worker прокси (запасной)
    upstream cf_backend {
        server claude-gateway.andrey710000.workers.dev:443;
    }

    server {
        listen 10000;

        location /health {
            return 200 '{"status":"ok","name":"renpr","upstreams":["direct","deno","cf-worker"]}';
            add_header Content-Type application/json;
        }

        # Основной прокси — прямой
        location /proxy/ {
            set $target $1;
            proxy_pass https://$1?$args;
            proxy_ssl_server_name on;
            proxy_set_header Host $1;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36";
            proxy_intercept_errors on;
            error_page 403 = @fallback;
        }

        # Запасной через Deno
        location @fallback {
            set $target $1;
            proxy_pass https://silent-tuna-64.attrib.deno.net/proxy?url=https://$1?$args;
            proxy_ssl_server_name on;
            proxy_set_header Host silent-tuna-64.attrib.deno.net;
            proxy_set_header User-Agent "Mozilla/5.0";
        }
    }
}

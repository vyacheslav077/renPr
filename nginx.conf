events { worker_connections 1024; }
http {
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    server {
        listen 10000;

        # Прокси через путь /proxy/domain
        location ~ ^/proxy/(https?)/(.+)$ {
            set $scheme $1;
            set $path $2;
            proxy_pass $scheme://$path$is_args$args;
            proxy_ssl_server_name on;
            proxy_set_header Host $proxy_host;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36";
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 256k;
        }

        # Прокси через ?url= параметр
        location /proxy {
            proxy_pass $arg_url;
            proxy_ssl_server_name on;
            proxy_set_header Host $proxy_host;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36";
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 256k;
        }

        location /health {
            return 200 '{"status":"ok","name":"proxy-render"}';
            add_header Content-Type application/json;
        }
    }
}

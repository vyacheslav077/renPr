events { worker_connections 1024; }
http {
    server {
        listen 10000;
        location /proxy {
            proxy_pass $arg_url;
            proxy_ssl_server_name on;
            proxy_set_header Host $proxy_host;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36";
        }
        location /health {
            return 200 '{"status":"ok","name":"proxy-render"}';
            add_header Content-Type application/json;
        }
    }
}
